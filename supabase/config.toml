# https://supabase.com/docs/guides/functions/function-configuration
# 문의 폼은 비로그인 사용자가 호출하므로 JWT 검증 비활성화.
# 대신 Edge Function에서 DB에 저장된 행과 페이로드 일치 여부를 검증합니다.
[functions.send-contact-mail]
verify_jwt = false

[functions.keep-alive]
verify_jwt = false

# 게이트웨이 JWT 검증은 끔. 일부 프로젝트(비대칭 JWT 등)에서 verify_jwt=true 면
# 유효한 세션으로도 API 게이트웨이가 401을 내는 경우가 있음 → 함수 내부에서 Bearer + getUser + 관리자 검사.
[functions.send-inquiry-reply]
verify_jwt = false
