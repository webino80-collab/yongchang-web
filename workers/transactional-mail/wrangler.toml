# Email Routing이 켜진 도메인(yongchang.co.kr)에서 발신(FROM)을 사용하세요.
#
# 수신(TO): send_email 은 "Email Routing → 목적지 주소"에 검증된 주소로만 발송 가능합니다.
# "destination address is not a verified address" → 관리자 메일(ycpbm@hanmail.net 등)을
# 대시보드 Email Routing에서 목적지로 추가하고, 인증 메일로 검증 완료해야 합니다.
# (임의의 고객 @gmail.com 등으로내려면 send_email 대신 SMTP Worker smtp-mail-api 사용)
# 배포: cd workers/transactional-mail && npm i && npx wrangler secret put MAIL_WORKER_KEY
#   (구명칭 MAIL_WORKER_SECRET 도 동일 동작 — Supabase MAIL_WORKER_KEY 와 값 맞출 것)
name = "yongchang-transactional-mail"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[vars]
FROM_ADDR = "no-reply@yongchang.co.kr"
FROM_NAME = "(주)용창"

# 발신 주소 제한(권장). FROM_ADDR 과 동일하게 맞추세요.
[[send_email]]
name = "MAIL"
allowed_sender_addresses = ["no-reply@yongchang.co.kr"]

# Workers Logs / Observability — 대시보드와 배포 설정 일치 (https://developers.cloudflare.com/workers/observability/logs/workers-logs/)
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1
persist = true
